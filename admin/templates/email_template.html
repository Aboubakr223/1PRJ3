<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; color:#333;">
    <div style="max-width:600px; margin:auto; border:1px solid #ddd; padding:20px; text-align:center;">
        <img src="logo.png" alt="Logo Salon" style="width:150px; margin-bottom:20px;">
        <h2 style="color:#2E86C1;">Confirmation de réservation</h2>
        <p>Bonjour <strong>{{nom_client}}</strong>,</p>
        <p>Votre réservation a été enregistrée avec succès :</p>
        <ul style="list-style:none; padding:0;">
            <li><strong>Service :</strong> {{service}}</li>
            <li><strong>Date :</strong> {{date}}</li>
            <li><strong>Heure :</strong> {{heure}}</li>
        </ul>
        <p>Merci pour votre confiance !</p>
        <hr style="margin-top:30px;">
        <p style="font-size:12px; color:#999;">Salon Test – Toutes les réservations sont confirmées par email.</p>
    </div>
</body>
</html>
